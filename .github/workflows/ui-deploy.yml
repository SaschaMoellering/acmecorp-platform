name: UI Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'webapp/**'
      - '.github/workflows/ui-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ui-deploy-prod
  cancel-in-progress: true

env:
  AWS_REGION: eu-west-1
  TF_WORKING_DIR: infra/terraform
  UI_BUILD_DIR: webapp/dist

jobs:
  deploy:
    name: Build And Deploy UI
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json

      - name: Install UI dependencies
        working-directory: webapp
        run: npm ci

      - name: Build UI
        working-directory: webapp
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Initialize Terraform
        run: terraform -chdir="${TF_WORKING_DIR}" init -input=false

      - name: Read UI deployment outputs
        id: tf
        run: |
          echo "bucket_name=$(terraform -chdir="${TF_WORKING_DIR}" output -raw ui_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(terraform -chdir="${TF_WORKING_DIR}" output -raw ui_cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_url=$(terraform -chdir="${TF_WORKING_DIR}" output -raw ui_cloudfront_url)" >> "$GITHUB_OUTPUT"
          echo "custom_url=$(terraform -chdir="${TF_WORKING_DIR}" output -raw ui_custom_url)" >> "$GITHUB_OUTPUT"

      - name: Sync immutable UI assets
        run: |
          aws s3 sync "${UI_BUILD_DIR}/" "s3://${{ steps.tf.outputs.bucket_name }}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"

      - name: Upload index.html with no-cache headers
        run: |
          aws s3 cp "${UI_BUILD_DIR}/index.html" "s3://${{ steps.tf.outputs.bucket_name }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf.outputs.distribution_id }}" \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "CloudFront URL: ${{ steps.tf.outputs.cloudfront_url }}"
          echo "Custom UI URL: ${{ steps.tf.outputs.custom_url }}"
