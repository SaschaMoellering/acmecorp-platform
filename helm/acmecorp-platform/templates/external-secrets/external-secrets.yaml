{{- $region := .Values.global.awsRegion }}
{{- $namePrefix := .Values.global.secretsNamePrefix }}
---
# Aurora credentials → acmecorp namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: aurora-credentials
  namespace: acmecorp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: aurora-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: {{ $namePrefix }}/aurora
        property: username
    - secretKey: password
      remoteRef:
        key: {{ $namePrefix }}/aurora
        property: password
---
# Amazon MQ credentials → acmecorp namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mq-credentials
  namespace: acmecorp
spec:
