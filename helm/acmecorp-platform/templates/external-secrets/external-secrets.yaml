{{- $namePrefix := .Values.global.secretsNamePrefix }}
{{- $appNamespace := include "acmecorp-platform.namespace.app" . }}
{{- $dataNamespace := include "acmecorp-platform.namespace.data" . }}
{{- $observabilityNamespace := include "acmecorp-platform.namespace.observability" . }}
---
# Aurora credentials → acmecorp namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: aurora-credentials
  namespace: {{ $appNamespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: aurora-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: {{ $namePrefix }}/aurora
        property: username
    - secretKey: password
      remoteRef:
        key: {{ $namePrefix }}/aurora
        property: password
---
# Amazon MQ credentials → acmecorp namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mq-credentials
  namespace: {{ $appNamespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: mq-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: {{ $namePrefix }}/mq
        property: username
    - secretKey: password
      remoteRef:
        key: {{ $namePrefix }}/mq
        property: password
---
# Redis password for Redis StatefulSet → data namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redis-credentials
  namespace: {{ $dataNamespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: redis-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ $namePrefix }}/redis
        property: password
---
# Redis password for analytics-service → acmecorp namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: analytics-redis-credentials
  namespace: {{ $appNamespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: analytics-redis-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ $namePrefix }}/redis
