enabled: true
image:
  repository: prom/prometheus
  tag: "v2.51.0"
  pullPolicy: IfNotPresent

service:
  port: 9090

retention: "15d"

resources:
  limits:
    cpu: "1"
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

persistence:
  enabled: true
  storageClass: gp3
  size: 20Gi
  accessMode: ReadWriteOnce

# ServiceMonitor discovery: Prometheus scrapes ServiceMonitors with label release=prometheus
serviceMonitor:
  selector:
    release: prometheus
