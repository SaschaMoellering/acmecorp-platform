apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "analytics-service.fullname" . }}
  namespace: {{ include "acmecorp-platform.namespace.app" . }}
  labels:
    {{- include "analytics-service.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "analytics-service.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "analytics-service.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "analytics-service.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
        {{- include "acmecorp-platform.tmpVolume" . | nindent 8 }}
      containers:
        - name: analytics
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: {{ .Values.service.port }}
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.config.springProfilesActive | quote }}
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "analytics-service.fullname" . }}-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "analytics-service.fullname" . }}-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "analytics-service.fullname" . }}-config
                  key: DB_NAME
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: aurora-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aurora-credentials
                  key: password
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "analytics-service.fullname" . }}-config
                  key: MQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "analytics-service.fullname" . }}-config
                  key: MQ_PORT
            - name: SPRING_RABBITMQ_SSL_ENABLED
              value: "true"
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "analytics-service.fullname" . }}-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "analytics-service.fullname" . }}-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.auth.secretName }}
                  key: {{ .Values.redis.auth.secretKey }}
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.auth.secretName }}
                  key: {{ .Values.redis.auth.secretKey }}
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mq-credentials
                  key: username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mq-credentials
                  key: password
          resources:
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
          {{- if .Values.probes.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.livenessPath }}
              port: {{ .Values.service.port }}
            initialDelaySeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readinessPath }}
              port: {{ .Values.service.port }}
            initialDelaySeconds: 15
            timeoutSeconds: 3
          {{- end }}
          volumeMounts:
            {{- include "acmecorp-platform.tmpVolumeMount" . | nindent 12 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "analytics-service.fullname" . }}-config
  namespace: {{ include "acmecorp-platform.namespace.app" . }}
  labels:
    {{- include "analytics-service.labels" . | nindent 4 }}
data:
  DB_HOST: {{ .Values.global.aurora.host | quote }}
  DB_PORT: {{ .Values.global.aurora.port | quote }}
  DB_NAME: {{ .Values.global.aurora.database | quote }}
  MQ_HOST: {{ .Values.global.mq.host | quote }}
  MQ_PORT: {{ .Values.global.mq.port | quote }}
  REDIS_HOST: {{ .Values.global.redis.host | quote }}
  REDIS_PORT: {{ .Values.global.redis.port | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "analytics-service.fullname" . }}
  namespace: {{ include "acmecorp-platform.namespace.app" . }}
  labels:
    {{- include "analytics-service.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.prometheus.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: ClusterIP
  selector:
    {{- include "analytics-service.labels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
---
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "analytics-service.serviceAccountName" . }}
  namespace: {{ include "acmecorp-platform.namespace.app" . }}
  labels:
    {{- include "analytics-service.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.serviceAccount.annotations | nindent 4 }}
{{- end }}
---
{{- if .Values.prometheus.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "analytics-service.fullname" . }}
  namespace: {{ include "acmecorp-platform.namespace.observability" . }}
  labels:
    {{- include "analytics-service.labels" . | nindent 4 }}
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - {{ include "acmecorp-platform.namespace.app" . }}
  selector:
    matchLabels:
      {{- include "analytics-service.labels" . | nindent 6 }}
  endpoints:
    - port: http
      interval: {{ .Values.prometheus.serviceMonitor.interval }}
      path: /actuator/prometheus
{{- end }}
