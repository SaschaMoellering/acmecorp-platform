{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "orders-service.serviceAccountName" . }}
  labels:
    {{- include "orders-service.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.serviceAccount.annotations | nindent 4 }}
    # Pod Identity annotation for IAM role
    eks.amazonaws.com/role-arn: "{{ .Values.global.aws.ordersServiceRoleArn }}"
{{- end }}
