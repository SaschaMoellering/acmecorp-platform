{{- if .Values.ingress.enabled }}
{{- $annotations := .Values.ingress.annotations | default dict }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "gateway-service.fullname" . }}-ingress
  labels:
    {{- include "gateway-service.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: {{ ternary "internet-facing" "internal" .Values.ingress.internal }}
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    {{- if .Values.ingress.tls.enabled }}
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.tls.certificateArn }}
    {{- if not (hasKey $annotations "alb.ingress.kubernetes.io/ssl-redirect") }}
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    {{- end }}
    {{- end }}
    {{- with $annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ default "alb" .Values.ingress.ingressClassName }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "gateway-service.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
