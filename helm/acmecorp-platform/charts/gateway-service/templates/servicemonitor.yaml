{{- if .Values.prometheus.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "gateway-service.fullname" . }}
  namespace: {{ include "acmecorp-platform.namespace.observability" . }}
  labels:
    {{- include "gateway-service.labels" . | nindent 4 }}
spec:
  endpoints:
    - port: http
      interval: {{ .Values.prometheus.serviceMonitor.interval }}
      path: /actuator/prometheus
  namespaceSelector:
    matchNames:
      - {{ include "acmecorp-platform.namespace.app" . }}
  selector:
    matchLabels:
      {{- include "gateway-service.labels" . | nindent 6 }}
{{- end }}
