enabled: true
image:
  repository: acmecorp/gateway-service
  tag: latest
  pullPolicy: IfNotPresent
imagePullSecrets: []
service:
  port: 8080
config:
  gatewayCorsOriginUi: https://app.acmecorp.autoscaling.io
  springProfilesActive: default
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi
serviceAccount:
  create: true
  annotations:
    # Populated by Terraform Pod Identity association — do not set manually
    # eks.amazonaws.com/pod-identity-association: <set via values-prod.yaml>

probes:
  enabled: true
  livenessPath: /actuator/health
  readinessPath: /actuator/health
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 60
ingress:
  enabled: false
  ingressClassName: alb
  host: api.acmecorp.example.com
  path: /
  internal: true
  tls:
    enabled: false
    certificateArn: ""
  annotations: {}
secret:
  create: false
  data: {}

prometheus:
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /actuator/prometheus
    prometheus.io/port: "8080"
  serviceMonitor:
    enabled: false
    interval: 15s
