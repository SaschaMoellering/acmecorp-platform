# Production overrides — values that differ from defaults in values.yaml.
# Aurora and MQ host values come from Terraform outputs.
# Secrets (passwords) are never stored here; they flow via ExternalSecret.

global:
  awsRegion: us-east-1
  secretsNamePrefix: acmecorp-platform-prod
  aurora:
    host: "<aurora-cluster-endpoint>"   # from: terraform output aurora_writer_endpoint
    port: "5432"
    database: acmecorp
  mq:
    host: "<mq-broker-hostname>"        # hostname only, normalized from terraform output mq_broker_endpoint
    port: "5671"
  redis:
    host: redis.data.svc.cluster.local
    port: "6379"

namespaces:
  enabled: false

storageClass:
  create: false

gateway-service:
  ingress:
    enabled: true
    host: api.acmecorp.example.com
    tls:
      enabled: true
      certificateArn: "<arn:aws:acm:us-east-1:ACCOUNT:certificate/CERT-ID>"
    internal: false
  config:
    springProfilesActive: eks
  prometheus:
    serviceMonitor:
      enabled: false

orders-service:
  config:
    springProfilesActive: eks

catalog-service:
  config:
    springProfilesActive: eks

grafana:
  ingress:
    host: grafana.acmecorp.example.com
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: "443"
      alb.ingress.kubernetes.io/certificate-arn: "<arn:aws:acm:us-east-1:ACCOUNT:certificate/CERT-ID>"
