global:
  imagePullSecrets: []
  awsRegion: us-east-1
  secretsNamePrefix: acmecorp-platform-prod
  namespaces:
    app: acmecorp
    data: data
    observability: observability
    externalSecrets: external-secrets
  aurora:
    host: ""        # set in values-prod.yaml from Terraform output
    port: "5432"
    database: acmecorp
  mq:
    host: ""        # set in values-prod.yaml from Terraform output
    port: "5671"    # AMQPS
  redis:
    host: redis.data.svc.cluster.local
    port: "6379"

namespaces:
  enabled: true

storageClass:
  create: true
  name: auto-ebs-sc
  defaultClass: false
  parameters:
    type: gp3
    encrypted: "true"

gateway-service:
  enabled: true
  image:
    repository: acmecorp/gateway-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8080
  ingress:
    enabled: false
    host: api.acmecorp.example.com
    path: /
    tls:
      enabled: false
      certificateArn: ""
    internal: true
    annotations: {}
  config:
    ordersBaseUrl: http://orders-service:8081
    catalogBaseUrl: http://catalog-service:8085
    billingBaseUrl: http://billing-service:8082
    notificationBaseUrl: http://notification-service:8083
    analyticsBaseUrl: http://analytics-service:8084
    springProfilesActive: default
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  probes:
    enabled: true
    livenessPath: /actuator/health/liveness
    readinessPath: /actuator/health/readiness
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 60
  serviceAccount:
    create: true
    annotations: {}
  prometheus:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: /actuator/prometheus
      prometheus.io/port: "8080"
    serviceMonitor:
      enabled: false
      interval: 15s

orders-service:
  enabled: true
  image:
    repository: acmecorp/orders-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8081
  config:
    springProfilesActive: eks
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  probes:
    enabled: true
    livenessPath: /actuator/health/liveness
    readinessPath: /actuator/health/readiness
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 60
  serviceAccount:
    create: true
    annotations: {}
  prometheus:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: /actuator/prometheus
      prometheus.io/port: "8081"
    serviceMonitor:
      enabled: false
      interval: 15s

catalog-service:
  enabled: true
  image:
    repository: acmecorp/catalog-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8085
  config:
    springProfilesActive: eks
  probes:
    enabled: false
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 60
  prometheus:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: /q/metrics
      prometheus.io/port: "8085"
    serviceMonitor:
      enabled: false
      interval: 15s

billing-service:
  enabled: true
  image:
    repository: acmecorp/billing-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8082
  config:
    springProfilesActive: eks
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  probes:
    enabled: true
    livenessPath: /actuator/health/liveness
    readinessPath: /actuator/health/readiness
  serviceAccount:
    create: true
    annotations: {}
  prometheus:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: /actuator/prometheus
      prometheus.io/port: "8082"
    serviceMonitor:
      enabled: false
      interval: 15s

notification-service:
  enabled: true
  image:
    repository: acmecorp/notification-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8083
  config:
    springProfilesActive: eks
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  probes:
    enabled: true
    livenessPath: /actuator/health
    readinessPath: /actuator/health
  serviceAccount:
    create: true
    annotations: {}
  prometheus:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: /actuator/prometheus
      prometheus.io/port: "8083"
    serviceMonitor:
      enabled: false
      interval: 15s

analytics-service:
  enabled: true
  image:
    repository: acmecorp/analytics-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8084
  config:
    springProfilesActive: eks
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  probes:
    enabled: true
    livenessPath: /actuator/health/liveness
    readinessPath: /actuator/health/readiness
  serviceAccount:
    create: true
    annotations: {}
  prometheus:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: /actuator/prometheus
      prometheus.io/port: "8084"
    serviceMonitor:
      enabled: false
      interval: 15s
  redis:
    auth:
      secretName: analytics-redis-credentials
      secretKey: password

redis:
  enabled: true
  image:
    repository: redis
    tag: "7.2-alpine"
    pullPolicy: IfNotPresent
  service:
    port: 6379
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  persistence:
    enabled: true
    storageClass: auto-ebs-sc
    size: 5Gi
    accessMode: ReadWriteOnce
  auth:
    secretName: redis-credentials
    secretKey: password

prometheus:
  enabled: true
  image:
    repository: prom/prometheus
    tag: "v2.51.0"
    pullPolicy: IfNotPresent
  service:
    port: 9090
  retention: "15d"
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi
  persistence:
    enabled: true
    storageClass: auto-ebs-sc
    size: 20Gi
    accessMode: ReadWriteOnce

grafana:
  enabled: true
  image:
    repository: grafana/grafana
    tag: "10.4.0"
    pullPolicy: IfNotPresent
  service:
    port: 3000
  auth:
    secretName: grafana-credentials
    secretKey: admin-password
  ingress:
    enabled: true
    ingressClassName: alb
    host: grafana.acmecorp.example.com
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: "443"
      alb.ingress.kubernetes.io/certificate-arn: ""
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  persistence:
    enabled: false

external-secrets:
  enabled: false
