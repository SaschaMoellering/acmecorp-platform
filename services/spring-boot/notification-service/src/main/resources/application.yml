server:
  port: 8083

spring:
  application:
    name: notification-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:acmecorp}
    username: ${DB_USERNAME:acmecorp}
    password: ${DB_PASSWORD:acmecorp}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  data:
    web:
      pageable:
        serialization-mode: via_dto
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

acmecorp:
  messaging:
    notification:
      retry:
        max-attempts: ${NOTIFICATION_RETRY_MAX_ATTEMPTS:3}
        initial-interval: ${NOTIFICATION_RETRY_INITIAL_INTERVAL:1000}
        multiplier: ${NOTIFICATION_RETRY_MULTIPLIER:2.0}
        max-interval: ${NOTIFICATION_RETRY_MAX_INTERVAL:5000}
      demo:
        fail-on-recipient: ${NOTIFICATION_FAIL_ON_RECIPIENT:}
  services:
    analytics: http://analytics-service:8084
