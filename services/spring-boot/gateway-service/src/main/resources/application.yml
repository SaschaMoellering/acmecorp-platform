server:
  port: 8080

spring:
  application:
    name: gateway-service
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

acmecorp:
  gateway:
    cors:
      allowed-origins:
        - ${GATEWAY_CORS_ORIGIN_LOCAL:http://localhost:5173}
        - ${GATEWAY_CORS_ORIGIN_LOCAL_ALT:http://127.0.0.1:5173}
        - ${GATEWAY_CORS_ORIGIN_PREVIEW:http://localhost:4173}
        - ${GATEWAY_CORS_ORIGIN_PREVIEW_ALT:http://127.0.0.1:4173}
        - ${GATEWAY_CORS_ORIGIN_UI:https://app.acmecorp.autoscaling.io}
  services:
    orders:
      base-url: ${ORDERS_BASE_URL:http://orders-service:8081}
    catalog:
      base-url: ${CATALOG_BASE_URL:http://catalog-service:8085}
    billing:
      base-url: ${BILLING_BASE_URL:http://billing-service:8082}
    notification:
      base-url: ${NOTIFICATION_BASE_URL:http://notification-service:8083}
    analytics:
      base-url: ${ANALYTICS_BASE_URL:http://analytics-service:8084}
