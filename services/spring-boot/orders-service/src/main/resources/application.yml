server:
  port: 8081

spring:
  application:
    name: orders-service
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:acmecorp}
    username: ${DB_USERNAME:acmecorp}
    password: ${DB_PASSWORD:acmecorp}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  data:
    web:
      pageable:
        serialization-mode: via_dto
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  cache:
    type: redis
    redis:
      time-to-live: 15m
      key-prefix: "orders"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

acmecorp:
  services:
    catalog: http://catalog-service:8085
    billing: http://billing-service:8082
    analytics: http://analytics-service:8084
    notification: http://notification-service:8083
  postgres:
    host: ${ACMECORP_PG_HOST:postgres}
    port: ${ACMECORP_PG_PORT:5432}
    database: ${ACMECORP_PG_DB:acmecorp}
    username: ${ACMECORP_PG_USER:acmecorp}
    region: ${ACMECORP_PG_REGION:${AWS_REGION:eu-west-1}}
    iam-auth:
      enabled: ${ACMECORP_PG_IAM_AUTH:false}
      max-lifetime: 9m
      pool-size: 10
