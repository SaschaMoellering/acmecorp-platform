quarkus.http.port=8085
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${ACMECORP_PG_USER:${DB_USERNAME:acmecorp}}
quarkus.datasource.password=${DB_PASSWORD:acmecorp}
quarkus.datasource.jdbc.url=${CATALOG_JDBC_URL:jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:acmecorp}}
quarkus.datasource.jdbc.data-source-class-name=com.acmecorp.catalog.config.IamAuthenticatedDataSource
quarkus.datasource.jdbc.max-lifetime=540000
acmecorp.postgres.host=${ACMECORP_PG_HOST:postgres}
acmecorp.postgres.port=${ACMECORP_PG_PORT:5432}
acmecorp.postgres.database=${ACMECORP_PG_DB:acmecorp}
acmecorp.postgres.username=${ACMECORP_PG_USER:acmecorp}
acmecorp.postgres.region=${ACMECORP_PG_REGION:${AWS_REGION:eu-west-1}}
acmecorp.postgres.iam-auth.enabled=${ACMECORP_PG_IAM_AUTH:false}
quarkus.hibernate-orm.database.generation=update
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{1}] (%t) %s%e%n

# Redis configuration
quarkus.redis.hosts=redis://${REDIS_HOST:redis}:${REDIS_PORT:6379}
quarkus.redis.password=${REDIS_PASSWORD:}
quarkus.redis.ssl=${REDIS_SSL_ENABLED:false}
quarkus.redis.max-pool-size=20
quarkus.redis.max-pool-waiting=24
quarkus.cache.redis.ttl=1H
quarkus.cache.redis.key-prefix=catalog
